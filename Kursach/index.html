<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат для друзей</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-app">
        <!-- Левая панель контактов -->
        <div class="contacts-panel">
            <div class="header">
                <h1>Чат для друзей</h1>
                <div class="divider"></div>
                <h2>Контакты</h2>
            </div>
            <div class="contact-list">
                <div class="contact active" data-contact-id="avant">
                    <img src="img_1.png" alt="User">
                    <div class="contact-info">
                        <span class="name">Группа заклинателей</span>
                        <span class="role">Академия</span>
                    </div>
                    <div class="status online"></div>
                </div>
                <div class="contact" data-contact-id="ratio">
                    <img src="img_2.png" alt="User">
                    <div class="contact-info">
                        <span class="name">Ценители сладостей</span>
                        <span class="role">Секта</span>
                    </div>
                    <div class="status offline"></div>
                </div>
            </div>
        </div>

        <!-- Центральная часть: чат -->
        <div class="chat-area">
            <div class="chat-header">
                <h2 id="current-chat">Группа заклинателей</h2>
                <div class="chat-actions">
                    <button class="btn-icon"><!-- Иконка звонка --></button>
                    <button class="btn-icon"><!-- Иконка настроек --></button>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div class="input-container">
                <div class="input-area">
                    <input type="text" id="message-input" placeholder="Напишите сообщение...">
                    <button id="send-button">Отправить ✈️</button>
                </div>
                <div class="bottom-panel">
                    <div class="panel-actions">
                        <button class="panel-btn" title="Прикрепить файл">
                            <svg width="18" height="18"></svg>
                        </button>
                        <button class="panel-btn" title="Смайлы">
                            <svg width="18" height="18"></svg>
                        </button>
                    </div>
                    <div class="panel-status">
                        <span>2025, все права защищены</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Правая панель новостей -->
        <div class="news-panel">
            <div class="news-header">
                <h3>Новости</h3>
            </div>
            <div class="news-content">
                <div class="news-item">
                    <p>Отличная погода!</p>
                </div>
                <div class="news-item">
                    <p>Планируется новое обновление.</p>
                </div>
                <div class="ad-place">
                    <p>Здесь могла быть ваша реклама!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
        let ws;
        let currentRoom = "avant";
        let currentUsername = "";
        let editingMessageId = null;

        const messagesContainer = document.getElementById("messages");
        const messageInput = document.getElementById("message-input");
        const sendButton = document.getElementById("send-button");
        const contacts = document.querySelectorAll(".contact");
        const currentChatTitle = document.getElementById("current-chat");

        // Инициализация пользователя
        currentUsername = prompt("Введите ваше имя:") || "Гость";

        function connectToRoom(room) {
            if (ws) {
                ws.close();
            }

            currentRoom = room;
            messagesContainer.innerHTML = "";

            ws = new WebSocket("ws://localhost:8765");

            ws.onopen = () => {
                ws.send(JSON.stringify({
                    type: "init",
                    username: currentUsername,
                    room: room
                }));
            };

            ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "history") {
        data.messages.forEach(msg => {
            if (msg.room === currentRoom) {
                addMessage(msg, msg.sender === currentUsername);
            }
        });
    } else if (data.type === "new_message" && data.message.room === currentRoom) {
        addMessage(data.message, data.message.sender === currentUsername);
    } else if (data.type === "message_edited") {
        const msgElement = document.querySelector(`[data-message-id="${data.message_id}"]`);
        if (msgElement) {
            // 1. Обновляем текст сообщения
            const messageTextEl = msgElement.querySelector('.message-text');
            messageTextEl.textContent = data.new_text; // безопаснее, чем innerHTML

            // 2. Находим или создаём контейнер для времени и метки
            let timeContainer = msgElement.querySelector('.message-time-container');

            if (!timeContainer) {
                timeContainer = document.createElement('div');
                timeContainer.className = 'message-time-container';

                const timeEl = document.createElement('span');
                timeEl.className = 'message-time';
                timeEl.textContent = data.edited_time || '—:—'; // время редактирования с сервера

                timeContainer.appendChild(timeEl);
                msgElement.appendChild(timeContainer);
            }

            // 3. Добавляем или обновляем метку "(ред.)"
            let badge = timeContainer.querySelector('.edited-badge');
            if (!badge) {
                badge = document.createElement('span');
                badge.className = 'edited-badge';
                badge.textContent = '(ред.)';
                timeContainer.appendChild(badge);
            }
        }
            } else if (data.type === "message_deleted") {
                const msgElement = document.querySelector(`[data-message-id="${data.message_id}"]`);
                if (msgElement) {
                    msgElement.remove();
                }
            }
        };

            ws.onclose = () => {
                console.log("Соединение закрыто");
            };

            ws.onerror = (error) => {
                console.error("Ошибка WebSocket:", error);
                alert("Ошибка подключения к серверу.");
            };
        }

            function addMessage(msg, isSent) {
            const messageElement = document.createElement("div");
            messageElement.className = `message ${isSent ? "sent" : "received"}`;
            messageElement.dataset.messageId = msg.id;

            const editedBadge = msg.edited ? '<span class="edited-badge">(ред.)</span>' : '';

            messageElement.innerHTML = `
                ${!isSent ? `
                    <div class="sender-info">
                        <span class="sender-name">${msg.sender}</span>
                        <img src="img_3.png" alt="${msg.sender}" class="avatar">
                    </div>
                ` : ''}

                <div class="message-content">
                    <div class="message-text">${escapeHTML(msg.text)}</div>
                    <div class="message-time-container">
                        <div class="message-time">${msg.time}</div>
                        ${editedBadge}
                    </div>
                    ${isSent ? `
                        <div class="message-actions">
                            <button class="edit-btn">✏️</button>
                            <button class="delete-btn">🗑️</button>
                        </div>
                    ` : ''}
                </div>
            `;

            if (isSent) {
                messageElement.querySelector('.edit-btn').addEventListener('click', () => {
                    editingMessageId = msg.id;
                    messageInput.value = msg.text;
                    messageInput.focus();
                });

                messageElement.querySelector('.delete-btn').addEventListener('click', () => {
                    if (confirm("Удалить сообщение?")) {
                        ws.send(JSON.stringify({
                            type: "delete_message",
                            message_id: msg.id
                        }));
                    }
                });
            }

            messagesContainer.appendChild(messageElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, m => ({
                '&': '&amp;',
                '<': '<',
                '>': '>',
                '"': '&quot;',
                "'": '&#39;'
            }[m]));
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

            if (editingMessageId) {
                ws.send(JSON.stringify({
                    type: "edit_message",
                    message_id: editingMessageId,
                    new_text: text
                }));
                editingMessageId = null;
            } else {
                ws.send(JSON.stringify({
                    type: "new_message",
                    text: text
                }));
            }

            messageInput.value = "";
        }

        // Переключение между контактами
        contacts.forEach(contact => {
            contact.addEventListener("click", function () {
                contacts.forEach(c => c.classList.remove("active"));
                this.classList.add("active");

                const room = this.getAttribute("data-contact-id");
                currentChatTitle.textContent = this.querySelector(".name").textContent;

                connectToRoom(room);
            });
        });

        // Обработчики событий
        sendButton.addEventListener("click", sendMessage);
        messageInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        // Начальное подключение
        connectToRoom(currentRoom);
    });
</script>
</body>
</html>
